<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>股神爭霸戰</title>
    <style>
        :root { --primary: #2c3e50; --gold: #f1c40f; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; padding: 20px; }
        .player-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-top: 6px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        input { width: 90%; padding: 5px; }
        .btn-order { background: #e67e22; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 5px; }
        .loading { color: #888; font-size: 0.8em; }
    </style>
</head>
<body>

<h1 style="text-align:center;">股神爭霸戰 - 鍵盤賭神</h1>

<div id="players-container"></div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxVd1iOT5bm8w9k3d75RxlCxnZUt32_LLOG_Kw8APO6ohXWCRWkK0Mqc4mM9XxoRvE-/exec";
    const players = ["金華", "麗娟", "欣梅", "彩蜂", "譚爸"];

    function init() {
        const container = document.getElementById('players-container');
        const now = new Date();
        const hour = now.getHours();
        const min = now.getMinutes();
        // 3.1 條款：13:30 鎖定 (測試時可暫時註解下行)
        const isLocked = (hour < 13 || (hour === 13 && min <= 30));

        players.forEach(name => {
            let html = `<div class="player-card"><h3>${name}</h3><table>
                <tr><th>代號</th><th>型態</th><th>委託價</th><th>股數</th><th>操作</th></tr>`;
            for(let i=1; i<=3; i++) {
                html += `<tr>
                    <td><input type="text" id="${name}-s-${i}" onblur="fetchPrice('${name}', ${i})" placeholder="輸入代號" ${isLocked ? 'disabled' : ''}></td>
                    <td><select id="${name}-t-${i}"><option>買進</option><option>賣出</option></select></td>
                    <td><input type="number" id="${name}-p-${i}" step="0.01"></td>
                    <td><input type="number" id="${name}-q-${i}"></td>
                    <td><button class="btn-order" onclick="doOrder('${name}', ${i})">下單</button></td>
                </tr>`;
            }
            html += `</table></div>`;
            container.innerHTML += html;
        });
    }

    async function fetchPrice(name, idx) {
        const id = document.getElementById(`${name}-s-${idx}`).value;
        if(id.length < 4) return;
        const pField = document.getElementById(`${name}-p-${idx}`);
        pField.placeholder = "載入中...";
        try {
            const r = await fetch(`${GAS_URL}?action=query&stock=${id}`);
            const d = await r.json();
            if(d.close > 0) pField.value = d.close;
        } catch(e) { console.error(e); }
    }

    async function doOrder(name, idx) {
        const data = {
            name: name,
            stock: document.getElementById(`${name}-s-${idx}`).value,
            side: document.getElementById(`${name}-t-${idx}`).value,
            price: parseFloat(document.getElementById(`${name}-p-${idx}`).value),
            qty: parseInt(document.getElementById(`${name}-q-${idx}`).value)
        };
        if(!data.stock || !data.price) return alert("請填寫完整");

        try {
            const resp = await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(data)
            });
            alert("委託已送出！若符合 10% 限制，資料將出現在試算表 Pending 分頁。");
        } catch(e) { alert("送出失敗"); }
    }

    window.onload = init;
</script>
</body>
</html>
